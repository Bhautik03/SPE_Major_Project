---
# cleanup_services can be overridden via -e to cleanup only specific services.
# Default: cleanup all services.  Example: -e '{"cleanup_services":["frontend"]}'
- name: Set default cleanup_services list
  set_fact:
    cleanup_services: "{{ cleanup_services | default(['auth-service', 'patient-service', 'frontend']) }}"

- name: Set cleanup image list
  set_fact:
    cleanup_images: "{{ cleanup_services | map('regex_replace', '-service$', '') | list }}"

# Remove Ansible-managed containers (plain names: auth-service, patient-service, frontend)
- name: Remove Ansible-managed microservice containers
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
  loop: "{{ cleanup_services }}"
  ignore_errors: yes

# Also remove docker-compose managed containers (prefixed: healthcare-auth, healthcare-patient, healthcare-frontend)
- name: Remove docker-compose managed microservice containers
  community.docker.docker_container:
    name: "healthcare-{{ item | regex_replace('-service$', '') }}"
    state: absent
  loop: "{{ cleanup_services }}"
  ignore_errors: yes

- name: Remove old microservice images
  shell: |
    for t in $(docker images "{{ docker_user }}/healthcare-{{ item }}" --format "{% raw %}{{.Tag}}{% endraw %}" | grep -E '^[0-9]+$'); do
      if [ "$t" -lt "{{ tag }}" ]; then
        docker rmi -f "{{ docker_user }}/healthcare-{{ item }}:$t" || true
      fi
    done
  loop: "{{ cleanup_images }}"
  ignore_errors: yes
