---
# cleanup_services can be overridden via -e to cleanup only specific services.
# Default: cleanup all services.  Example: -e '{"cleanup_services":["patient-service"]}'
- name: Set default cleanup_services list
  set_fact:
    cleanup_services: "{{ cleanup_services | default(['auth-service', 'patient-service', 'frontend']) }}"

- name: Set cleanup image list
  set_fact:
    cleanup_images: "{{ cleanup_services | map('regex_replace', '-service$', '') | list }}"

- name: Remove microservice containers
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
  loop: "{{ cleanup_services }}"
  ignore_errors: yes

- name: Remove old microservice images
  shell: |
    for t in $(docker images "{{ docker_user }}/healthcare-{{ item }}" --format "{% raw %}{{.Tag}}{% endraw %}" | grep -E '^[0-9]+$'); do
      if [ "$t" -lt "{{ tag }}" ]; then
        docker rmi -f "{{ docker_user }}/healthcare-{{ item }}:$t" || true
      fi
    done
  loop: "{{ cleanup_images }}"
  ignore_errors: yes

