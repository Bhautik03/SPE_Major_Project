version: "3.9"

# ─────────────────────────────────────────────
#  NETWORKS
# ─────────────────────────────────────────────
networks:
  auth-network:
    driver: bridge
  patient-network:
    driver: bridge
  monitoring-network:
    driver: bridge
  elk-network:
    driver: bridge
  gateway-network:
    driver: bridge

# ─────────────────────────────────────────────
#  VOLUMES
# ─────────────────────────────────────────────
volumes:
  mongo-data:
  redis-data:
  es-data:
  prometheus-data:
  grafana-data:

# ─────────────────────────────────────────────
#  SERVICES
# ─────────────────────────────────────────────
services:

  # ── MongoDB ─────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: healthcare-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - auth-network
      - patient-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (in-memory cache for concurrency) ──
  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - auth-network
      - patient-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service ─────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: healthcare-auth
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/healthcare_sys
      - JWT_SECRET=supersecret_auth_key_123
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth-network
      - gateway-network
      - elk-network
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Patient Service ───────────────────────────
  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: healthcare-patient
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGODB_URI=mongodb://mongodb:27017/healthcare_sys
      - JWT_SECRET=supersecret_auth_key_123
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - patient-network
      - gateway-network
      - elk-network
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - patient-service
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx API Gateway ────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: healthcare-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - patient-service
      - frontend
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────
  #  ELK STACK
  # ──────────────────────────────────────────────

  # ── Elasticsearch ────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: healthcare-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - "ELASTIC_PASSWORD=elastic123"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - elk-network
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ── Logstash ─────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: healthcare-logstash
    restart: unless-stopped
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./k8s/elk/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./k8s/elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600 | grep -q 'green'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Kibana ───────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: healthcare-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-network
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  #  MONITORING: Prometheus + Grafana
  # ──────────────────────────────────────────────

  # ── Prometheus ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: healthcare-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - monitoring-network
      - gateway-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Grafana ───────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: healthcare-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./k8s/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
