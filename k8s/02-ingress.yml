# ──────────────────────────────────────────────
#  Ingress — routes all external traffic
#  Requires: minikube addons enable ingress
# ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-ingress
  namespace: frontend          # Ingress lives in frontend ns; routes to services cross-namespace via ExternalName or same-ns
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: healthcare.local        # Add to /etc/hosts: $(minikube ip) healthcare.local
      http:
        paths:
          # ── Frontend ─────────────────────────
          - path: /()(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
---
# ──────────────────────────────────────────────
#  ExternalName Services (cross-namespace routing)
#  Map auth + patient services into frontend namespace
#  so Ingress can reach them
# ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: auth-service-ext
  namespace: frontend
spec:
  type: ExternalName
  externalName: auth-service.auth.svc.cluster.local
  ports:
    - port: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service-ext
  namespace: frontend
spec:
  type: ExternalName
  externalName: patient-service.patient.svc.cluster.local
  ports:
    - port: 5002
---
# ──────────────────────────────────────────────
#  Ingress rules for API routes
# ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-api-ingress
  namespace: frontend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: healthcare.local
      http:
        paths:
          # ── Auth API ──────────────────────────
          - path: /auth(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: auth-service-ext
                port:
                  number: 5001
          # ── Patient API ───────────────────────
          - path: /patients(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service-ext
                port:
                  number: 5002
