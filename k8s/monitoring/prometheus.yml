global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # ── Prometheus self-monitoring ──────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Auth Service ────────────────────────────
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:5001"]
    metrics_path: /metrics
    scrape_interval: 10s

  # ── Patient Service ─────────────────────────
  - job_name: "patient-service"
    static_configs:
      - targets: ["patient-service:5002"]
    metrics_path: /metrics
    scrape_interval: 10s

  # ── MongoDB exporter ────────────────────────
  - job_name: "mongodb"
    static_configs:
      - targets: ["mongodb:27017"]

  # ── Nginx ───────────────────────────────────
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:80"]
    metrics_path: /nginx-health
