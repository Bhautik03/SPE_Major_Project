filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  indices:
    - index: "healthcare-logs-%{+yyyy.MM.dd}"

setup.kibana:
  host: "http://kibana:5601"

logging.level: info
logging.to_files: false
