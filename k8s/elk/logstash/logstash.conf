input {
  # Accept logs from microservices via TCP (JSON format)
  tcp {
    port => 5044
    codec => json_lines
  }
  # Also accept beats (filebeat)
  beats {
    port => 5045
  }
}

filter {
  # Parse timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Add service tag if missing
  if ![service] {
    mutate {
      add_field => { "service" => "unknown" }
    }
  }

  # Parse HTTP status codes into categories
  if [status] {
    if [status] >= 500 {
      mutate { add_field => { "log_level" => "ERROR" } }
    } else if [status] >= 400 {
      mutate { add_field => { "log_level" => "WARN" } }
    } else {
      mutate { add_field => { "log_level" => "INFO" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "healthcare-logs-%{+YYYY.MM.dd}"
  }
  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}
